# Mise will automatically read and use .tool-versions files as well as this file.

[settings]
experimental = true

[env]
# See env.example to configure API keys.
_.file = ".env"

[tools]
nodejs = "24.15.0"
npm = "11.12.1"
pnpm = "10.33.0"
deno = "2.7.6"

[hooks]
postinstall = "pnpm install --frozen-lockfile"
