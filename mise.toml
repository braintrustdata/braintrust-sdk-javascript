# Mise will automatically read and use .tool-versions files as well as this file.

[settings]
experimental = true

[env]
# See env.example to configure API keys.
_.file = ".env"

[tools]
nodejs = "22.15.0"
npm = "11.11.1"
pnpm = "10.33.0"

[hooks]
postinstall = "pnpm install --frozen-lockfile && dotagents install"
