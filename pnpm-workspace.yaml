packages:
  - e2e
  - js
  - dev-packages/*
  - integrations/*
  - js/src/wrappers/*
  - "!js/vendor/**"

blockExoticSubdeps: true
minimumReleaseAge: 4320 # 3 days (in minutes)
minimumReleaseAgeExclude:
  - "@braintrust/bt-*" # bt binary packages, published in lockstep with braintrust
trustPolicy: no-downgrade
# Ignore the check for packages published more than 30 days ago (pnpm 10.27+)
# Useful for older packages that pre-date provenance support
trustPolicyIgnoreAfter: 43200 # minutes (30 days)
strictDepBuilds: true
overrides:
  handlebars: ^4.7.9
  protobufjs: ^7.5.8
  esbuild: 0.27.4
  uuid: 11.1.1
  router@2.2.0>path-to-regexp: 8.4.0
  express@5.2.1>qs: 6.15.2
  qs@>=6.7.0 <6.15.2: ^6.15.2
  tar@>=7.0.0 <7.5.11: ^7.5.11
  tar@>=6.0.0 <7.0.0: ^6.2.1
  hono@>=4.0.0 <4.12.18: ^4.12.18
  flatted@<3.4.2: ^3.4.2
  markdown-it@>=13.0.0 <14.1.1: ^14.1.1
  ip-address@<10.1.1: ^10.1.1
  js-yaml@>=4.0.0 <4.1.1: ^4.1.1
  js-yaml@<3.14.2: ^3.14.2
  "@mikro-orm/knex@>=6.0.0 <6.6.14": ^6.6.14
  glob@>=10.2.0 <10.5.0: ^10.5.0
allowBuilds:
  "@swc/core": false
  esbuild: false
  msw: false
  protobufjs: false
