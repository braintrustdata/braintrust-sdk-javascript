name: Release Packages

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 4 * * *" # Nightly at 04:00 UTC
  workflow_dispatch:
    inputs:
      release_mode:
        description: Release mode
        required: true
        type: choice
        options:
          - prerelease
          - canary
          - dry-run-stable
          - dry-run-prerelease
          - dry-run-canary
      branch:
        description: Branch to use for prerelease modes
        required: false
        type: string
      ref:
        description: Ref to use for stable/canary dry runs
        required: false
        default: main
        type: string

concurrency:
  group: >-
    release-${{ github.event_name == 'push' && 'stable-main' || github.event_name == 'schedule' && 'canary-nightly' || format('{0}-{1}', inputs.release_mode, inputs.branch || inputs.ref || 'main') }}
  cancel-in-progress: false

env:
  HUSKY: "0"

jobs:
  stable-release-pr:
    if: github.event_name == 'push' && github.ref_name == 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .tool-versions
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Validate publishable package metadata
        run: node scripts/release/validate-publishable-packages.mjs
      - name: Create or update release PR
        id: changesets
        uses: changesets/action@d4c53c294341eec8a419ec2d1927138bfdeec234
        with:
          version: pnpm exec changeset version && pnpm install --lockfile-only
          commit: "[ci] release"
          title: "[ci] release"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Summarize stable release PR state
        if: always()
        run: |
          if [ "${{ steps.changesets.outputs.hasChangesets }}" = "true" ]; then
            {
              echo "## Stable release PR"
              echo
              echo "Pending changesets were found and the release PR was refreshed."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "## Stable release PR"
              echo
              echo "No pending changesets to release from main."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

  stable-detect-publish:
    if: github.event_name == 'push' && github.ref_name == 'main'
    needs: stable-release-pr
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    outputs:
      has_work: ${{ steps.detect.outputs.has_work }}
      needs_publish: ${{ steps.detect.outputs.needs_publish }}
      needs_tags: ${{ steps.detect.outputs.needs_tags }}
      needs_github_releases: ${{ steps.detect.outputs.needs_github_releases }}
      manifest_path: ${{ steps.detect.outputs.manifest_path }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .tool-versions
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Validate publishable package metadata
        run: node scripts/release/validate-publishable-packages.mjs
      - name: Detect stable publish work
        id: detect
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/release/should-publish-stable.mjs --output .release-manifest.json

  stable-publish:
    if: github.event_name == 'push' && github.ref_name == 'main' && needs.stable-detect-publish.outputs.has_work == 'true'
    needs: stable-detect-publish
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      id-token: write
    environment: npm-publish
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .tool-versions
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Validate publishable package metadata
        run: node scripts/release/validate-publishable-packages.mjs
      - name: Detect stable publish work
        id: detect
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/release/should-publish-stable.mjs --output .release-manifest.json
      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Build publishable packages
        if: steps.detect.outputs.needs_publish == 'true'
        run: bash scripts/release/build-publishable-packages.sh .release-manifest.json
      - name: Publish stable packages to npm
        if: steps.detect.outputs.needs_publish == 'true'
        run: pnpm exec changeset publish
        env:
          NPM_TOKEN: ""
      - name: Push Changesets release tags
        if: steps.detect.outputs.has_work == 'true'
        run: node scripts/release/push-release-tags.mjs --manifest .release-manifest.json
      - name: Create GitHub Releases
        if: steps.detect.outputs.has_work == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/release/create-github-releases.mjs --manifest .release-manifest.json
      - name: Summarize stable release
        id: summary
        run: node scripts/release/summarize-release.mjs --mode stable --manifest .release-manifest.json
      - name: Post stable release to Slack
        uses: slackapi/slack-github-action@af78098f536edbc4de71162a307590698245be95 # v3.0.1
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: C0ABHT0SWA2
            text: "✅ JavaScript packages published"
            blocks:
              - type: "header"
                text:
                  type: "plain_text"
                  text: "✅ JavaScript packages published"
              - type: "section"
                text:
                  type: "mrkdwn"
                  text: "*Packages:*\n${{ steps.summary.outputs.markdown }}\n\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"

  prerelease-snapshot:
    if: github.event_name == 'workflow_dispatch' && inputs.release_mode == 'prerelease'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          ref: ${{ inputs.branch || github.ref_name }}
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .tool-versions
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Validate publishable package metadata
        run: node scripts/release/validate-publishable-packages.mjs
      - name: Compute changeset status
        run: pnpm exec changeset status --output=.changeset-status.json
      - name: Check prerelease status
        id: status_check
        run: node scripts/release/check-changeset-status.mjs --mode prerelease --status-file .changeset-status.json
      - name: Version snapshot prerelease packages
        if: steps.status_check.outputs.has_packages == 'true'
        run: pnpm exec changeset version --snapshot rc
      - name: Prepare prerelease manifest
        if: steps.status_check.outputs.has_packages == 'true'
        id: manifest
        run: node scripts/release/prepare-release-manifest.mjs --mode prerelease --status-file .changeset-status.json --output .release-manifest.json
      - name: Build publishable packages
        if: steps.status_check.outputs.has_packages == 'true'
        run: bash scripts/release/build-publishable-packages.sh .release-manifest.json
      - name: Publish snapshot prereleases
        if: steps.status_check.outputs.has_packages == 'true'
        run: pnpm exec changeset publish --tag rc --no-git-tag
        env:
          NPM_TOKEN: ""
      - name: Summarize prerelease publish
        if: steps.status_check.outputs.has_packages == 'true'
        id: summary
        run: node scripts/release/summarize-release.mjs --mode prerelease --manifest .release-manifest.json
      - name: Post prerelease publish to Slack
        if: steps.status_check.outputs.has_packages == 'true'
        uses: slackapi/slack-github-action@af78098f536edbc4de71162a307590698245be95 # v3.0.1
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: C0ABHT0SWA2
            text: "🧪 JavaScript prerelease snapshots published"
            blocks:
              - type: "header"
                text:
                  type: "plain_text"
                  text: "🧪 JavaScript prerelease snapshots published"
              - type: "section"
                text:
                  type: "mrkdwn"
                  text: "*Branch:* `${{ inputs.branch || github.ref_name }}`\n*Tag:* `rc`\n*Packages:*\n${{ steps.summary.outputs.markdown }}\n\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"

  canary-snapshot:
    if: >-
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && inputs.release_mode == 'canary')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .tool-versions
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Validate publishable package metadata
        run: node scripts/release/validate-publishable-packages.mjs
      - name: Compute changeset status
        run: pnpm exec changeset status --output=.changeset-status.json
      - name: Check canary status
        id: status_check
        run: node scripts/release/check-changeset-status.mjs --mode canary --status-file .changeset-status.json
      - name: Check if canary already published for HEAD
        if: steps.status_check.outputs.has_packages == 'true'
        id: canary_check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/release/should-publish-canary.mjs --status-file .changeset-status.json
      - name: Version canary snapshot
        if: steps.status_check.outputs.has_packages == 'true' && steps.canary_check.outputs.should_publish == 'true'
        run: pnpm exec changeset version --snapshot canary
      - name: Prepare canary manifest
        if: steps.status_check.outputs.has_packages == 'true' && steps.canary_check.outputs.should_publish == 'true'
        id: manifest
        run: node scripts/release/prepare-release-manifest.mjs --mode canary --status-file .changeset-status.json --output .release-manifest.json
      - name: Build publishable packages
        if: steps.status_check.outputs.has_packages == 'true' && steps.canary_check.outputs.should_publish == 'true'
        run: bash scripts/release/build-publishable-packages.sh .release-manifest.json
      - name: Publish canary snapshots
        if: steps.status_check.outputs.has_packages == 'true' && steps.canary_check.outputs.should_publish == 'true'
        run: pnpm exec changeset publish --tag canary --no-git-tag
        env:
          NPM_TOKEN: ""
      - name: Summarize canary publish
        if: steps.status_check.outputs.has_packages == 'true' && steps.canary_check.outputs.should_publish == 'true'
        id: summary
        run: node scripts/release/summarize-release.mjs --mode canary --manifest .release-manifest.json
      - name: Post canary publish to Slack
        if: steps.status_check.outputs.has_packages == 'true' && steps.canary_check.outputs.should_publish == 'true'
        uses: slackapi/slack-github-action@af78098f536edbc4de71162a307590698245be95 # v3.0.1
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: C0ABHT0SWA2
            text: "🐤 JavaScript canary snapshots published"
            blocks:
              - type: "header"
                text:
                  type: "plain_text"
                  text: "🐤 JavaScript canary snapshots published"
              - type: "section"
                text:
                  type: "mrkdwn"
                  text: "*Tag:* `canary`\n*Commit:* `${{ github.sha }}`\n*Packages:*\n${{ steps.summary.outputs.markdown }}\n\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"

  dry-run-canary:
    if: github.event_name == 'workflow_dispatch' && inputs.release_mode == 'dry-run-canary'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref || 'main' }}
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .tool-versions
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Validate publishable package metadata
        run: node scripts/release/validate-publishable-packages.mjs
      - name: Compute changeset status
        run: pnpm exec changeset status --output=.changeset-status.json
      - name: Check canary dry-run status
        id: status_check
        run: node scripts/release/check-changeset-status.mjs --mode dry-run-canary --status-file .changeset-status.json
      - name: Version canary dry-run packages
        if: steps.status_check.outputs.has_packages == 'true'
        run: pnpm exec changeset version --snapshot canary
      - name: Prepare canary dry-run manifest
        if: steps.status_check.outputs.has_packages == 'true'
        run: node scripts/release/prepare-release-manifest.mjs --mode dry-run-canary --status-file .changeset-status.json --output .release-manifest.json
      - name: Build publishable packages
        if: steps.status_check.outputs.has_packages == 'true'
        run: bash scripts/release/build-publishable-packages.sh .release-manifest.json
      - name: Pack canary dry-run packages
        if: steps.status_check.outputs.has_packages == 'true'
        run: node scripts/release/pack-publishable-packages.mjs --manifest .release-manifest.json --output-dir artifacts/dry-run-canary
      - name: Summarize canary dry run
        if: steps.status_check.outputs.has_packages == 'true'
        run: node scripts/release/summarize-release.mjs --mode dry-run-canary --manifest .release-manifest.json
      - name: Upload canary dry-run artifacts
        if: steps.status_check.outputs.has_packages == 'true'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: canary-dry-run-${{ github.run_id }}
          path: artifacts/dry-run-canary
          retention-days: 5

  dry-run-stable:
    if: github.event_name == 'workflow_dispatch' && inputs.release_mode == 'dry-run-stable'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref || 'main' }}
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .tool-versions
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Validate publishable package metadata
        run: node scripts/release/validate-publishable-packages.mjs
      - name: Compute changeset status
        run: pnpm exec changeset status --output=.changeset-status.json
      - name: Check stable dry-run status
        id: status_check
        run: node scripts/release/check-changeset-status.mjs --mode dry-run-stable --status-file .changeset-status.json
      - name: Version stable dry-run packages
        if: steps.status_check.outputs.has_packages == 'true'
        run: pnpm exec changeset version && pnpm install --lockfile-only
      - name: Prepare stable dry-run manifest
        if: steps.status_check.outputs.has_packages == 'true'
        run: node scripts/release/prepare-release-manifest.mjs --mode dry-run-stable --status-file .changeset-status.json --output .release-manifest.json
      - name: Build publishable packages
        if: steps.status_check.outputs.has_packages == 'true'
        run: bash scripts/release/build-publishable-packages.sh .release-manifest.json
      - name: Pack stable dry-run packages
        if: steps.status_check.outputs.has_packages == 'true'
        run: node scripts/release/pack-publishable-packages.mjs --manifest .release-manifest.json --output-dir artifacts/dry-run-stable
      - name: Summarize stable dry run
        if: steps.status_check.outputs.has_packages == 'true'
        run: node scripts/release/summarize-release.mjs --mode dry-run-stable --manifest .release-manifest.json
      - name: Upload stable dry-run artifacts
        if: steps.status_check.outputs.has_packages == 'true'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: stable-dry-run-${{ github.run_id }}
          path: artifacts/dry-run-stable
          retention-days: 5

  dry-run-prerelease:
    if: github.event_name == 'workflow_dispatch' && inputs.release_mode == 'dry-run-prerelease'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          ref: ${{ inputs.branch || github.ref_name }}
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .tool-versions
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Validate publishable package metadata
        run: node scripts/release/validate-publishable-packages.mjs
      - name: Compute changeset status
        run: pnpm exec changeset status --output=.changeset-status.json
      - name: Check prerelease dry-run status
        id: status_check
        run: node scripts/release/check-changeset-status.mjs --mode dry-run-prerelease --status-file .changeset-status.json
      - name: Version prerelease dry-run packages
        if: steps.status_check.outputs.has_packages == 'true'
        run: pnpm exec changeset version --snapshot rc
      - name: Prepare prerelease dry-run manifest
        if: steps.status_check.outputs.has_packages == 'true'
        run: node scripts/release/prepare-release-manifest.mjs --mode dry-run-prerelease --status-file .changeset-status.json --output .release-manifest.json
      - name: Build publishable packages
        if: steps.status_check.outputs.has_packages == 'true'
        run: bash scripts/release/build-publishable-packages.sh .release-manifest.json
      - name: Pack prerelease dry-run packages
        if: steps.status_check.outputs.has_packages == 'true'
        run: node scripts/release/pack-publishable-packages.mjs --manifest .release-manifest.json --output-dir artifacts/dry-run-prerelease
      - name: Summarize prerelease dry run
        if: steps.status_check.outputs.has_packages == 'true'
        run: node scripts/release/summarize-release.mjs --mode dry-run-prerelease --manifest .release-manifest.json
      - name: Upload prerelease dry-run artifacts
        if: steps.status_check.outputs.has_packages == 'true'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: prerelease-dry-run-${{ github.run_id }}
          path: artifacts/dry-run-prerelease
          retention-days: 5

  notify-failure:
    needs:
      [
        stable-release-pr,
        stable-detect-publish,
        stable-publish,
        prerelease-snapshot,
        canary-snapshot,
        dry-run-stable,
        dry-run-prerelease,
        dry-run-canary,
      ]
    if: |
      always() &&
      (
        needs.stable-release-pr.result == 'failure' ||
        needs.stable-detect-publish.result == 'failure' ||
        needs.stable-publish.result == 'failure' ||
        needs.prerelease-snapshot.result == 'failure' ||
        needs.canary-snapshot.result == 'failure' ||
        needs.dry-run-stable.result == 'failure' ||
        needs.dry-run-prerelease.result == 'failure' ||
        needs.dry-run-canary.result == 'failure'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Post to Slack on failure
        uses: slackapi/slack-github-action@af78098f536edbc4de71162a307590698245be95 # v3.0.1
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: C0ABHT0SWA2
            text: "🚨 JavaScript release workflow failed"
            blocks:
              - type: "header"
                text:
                  type: "plain_text"
                  text: "🚨 JavaScript release workflow failed"
              - type: "section"
                text:
                  type: "mrkdwn"
                  text: "*Event:* `${{ github.event_name }}`\n*Ref:* `${{ github.ref_name }}`\n*Mode:* `${{ inputs.release_mode || 'stable-main' }}`\n\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
