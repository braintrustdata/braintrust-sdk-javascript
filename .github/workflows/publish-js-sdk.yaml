name: Release Packages

on:
  workflow_dispatch:
    inputs:
      release_mode:
        description: Release mode
        required: true
        type: choice
        options:
          - stable
          - prerelease
      ref:
        description: Ref to release
        required: true
        default: release
        type: string

concurrency:
  group: release-js-packages-${{ inputs.release_mode }}-${{ inputs.ref }}
  cancel-in-progress: false

env:
  HUSKY: "0"
  NPM_CONFIG_PROVENANCE: "true"

jobs:
  stable-release:
    if: inputs.release_mode == 'stable'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      id-token: write
    environment: npm-publish
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref }}
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .tool-versions
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Validate package metadata
        run: node scripts/release/validate-publishable-packages.mjs
      - name: Detect stable publish work
        id: detect
        run: node scripts/release/release-manifest.mjs --mode stable --output .release-manifest.json
      - name: Build packages
        if: steps.detect.outputs.needs_publish == 'true'
        run: pnpm run build
      - name: Publish stable packages to npm
        if: steps.detect.outputs.needs_publish == 'true'
        env:
          NODE_AUTH_TOKEN: ""
          NPM_TOKEN: ""
        run: node scripts/release/publish-release-manifest.mjs --manifest .release-manifest.json
      - name: Push Changesets release tags
        if: steps.detect.outputs.has_work == 'true'
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          target_commit="$(jq -r '.commit // empty' .release-manifest.json)"
          mapfile -t tags < <(
            jq -r '.packages[]? | .tag // "\(.name)@\(.version)"' .release-manifest.json
          )

          if [ "${#tags[@]}" -eq 0 ]; then
            echo "No release tags to push."
            exit 0
          fi

          if [ -z "$target_commit" ]; then
            echo "Release manifest is missing commit." >&2
            exit 1
          fi

          to_push=()
          for tag in "${tags[@]}"; do
            if git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1; then
              continue
            fi

            if git rev-parse -q --verify "refs/tags/$tag" >/dev/null 2>&1; then
              local_target="$(git rev-list -n 1 "$tag")"
              if [ "$local_target" != "$target_commit" ]; then
                echo "Local tag $tag already exists on $local_target, expected $target_commit." >&2
                exit 1
              fi
            else
              git tag "$tag" "$target_commit"
            fi

            to_push+=("refs/tags/$tag")
          done

          if [ "${#to_push[@]}" -eq 0 ]; then
            echo "All release tags already exist on origin."
            exit 0
          fi

          git push origin "${to_push[@]}"
      - name: Create GitHub Releases
        if: steps.detect.outputs.has_work == 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node scripts/release/create-github-releases.mjs --manifest .release-manifest.json
      - name: Post stable release to Slack
        if: steps.detect.outputs.has_work == 'true'
        uses: slackapi/slack-github-action@af78098f536edbc4de71162a307590698245be95 # v3.0.1
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: C0ABHT0SWA2
            text: "✅ JavaScript packages published"
            blocks:
              - type: "header"
                text:
                  type: "plain_text"
                  text: "✅ JavaScript packages published"
              - type: "section"
                text:
                  type: "mrkdwn"
                  text: "*Packages:*\n${{ steps.detect.outputs.markdown }}\n\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"

  prerelease-snapshot:
    if: inputs.release_mode == 'prerelease'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref }}
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .tool-versions
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Validate publishable package metadata
        run: node scripts/release/validate-publishable-packages.mjs
      - name: Compute changeset status
        run: pnpm exec changeset status --output=.changeset-status.json
      - name: Version packages
        run: pnpm exec changeset version --snapshot rc
      - name: Prepare release manifest
        id: manifest
        run: node scripts/release/release-manifest.mjs --mode prerelease --status-file .changeset-status.json --output .release-manifest.json
      - name: Build publishable packages
        if: steps.manifest.outputs.has_packages == 'true'
        run: pnpm run build
      - name: Publish prerelease packages to npm
        if: steps.manifest.outputs.has_packages == 'true'
        env:
          NODE_AUTH_TOKEN: ""
          NPM_TOKEN: ""
        run: node scripts/release/publish-release-manifest.mjs --manifest .release-manifest.json --tag rc
      - name: Post prerelease to Slack
        if: steps.manifest.outputs.has_packages == 'true'
        uses: slackapi/slack-github-action@af78098f536edbc4de71162a307590698245be95 # v3.0.1
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: C0ABHT0SWA2
            text: "🧪 JavaScript prerelease snapshots published"
            blocks:
              - type: "header"
                text:
                  type: "plain_text"
                  text: "🧪 JavaScript prerelease snapshots published"
              - type: "section"
                text:
                  type: "mrkdwn"
                  text: "*Ref:* `${{ inputs.ref }}`\n*Tag:* `rc`\n\n*Packages:*\n${{ steps.manifest.outputs.markdown }}\n\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"

  notify-failure:
    needs:
      - stable-release
      - prerelease-snapshot
    if: |
      always() &&
      (
        needs.stable-release.result == 'failure' ||
        needs.prerelease-snapshot.result == 'failure'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Post to Slack on failure
        uses: slackapi/slack-github-action@af78098f536edbc4de71162a307590698245be95 # v3.0.1
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: C0ABHT0SWA2
            text: "🚨 JavaScript release workflow failed"
            blocks:
              - type: "header"
                text:
                  type: "plain_text"
                  text: "🚨 JavaScript release workflow failed"
              - type: "section"
                text:
                  type: "mrkdwn"
                  text: "*Workflow:* `Release JS Packages`\n*Ref:* `${{ inputs.ref }}`\n*Mode:* `${{ inputs.release_mode }}`\n\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
