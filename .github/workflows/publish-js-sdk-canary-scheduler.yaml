name: Publish JS SDK Canary Scheduler

on:
  schedule:
    - cron: "0 4 * * *" # Nightly at 04:00 UTC
  workflow_dispatch:

permissions:
  actions: write
  contents: read

concurrency:
  group: publish-js-sdk-canary-scheduler
  cancel-in-progress: false

jobs:
  dispatch-canary:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Dispatch canary publish workflow
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const { owner, repo } = context.repo;
            const ref = context.payload.repository.default_branch;

            await github.rest.actions.createWorkflowDispatch({
              owner,
              repo,
              workflow_id: 'publish-js-sdk.yaml',
              ref,
              inputs: {
                release_mode: 'canary',
              },
            });

            core.summary
              .addHeading('Dispatched JS canary publish')
              .addList([
                `Workflow: publish-js-sdk.yaml`,
                `Mode: canary`,
                `Ref: ${ref}`,
              ])
              .write();
